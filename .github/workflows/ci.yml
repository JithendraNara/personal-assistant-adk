name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,litellm]"
          pip install ruff pip-audit bandit

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest -q

      - name: Dependency integrity
        run: pip check

      - name: Dependency vulnerabilities
        run: pip-audit --local

      - name: Security scan
        run: bandit -q -r personal_assistant serve.py run.py mcp_server.py
